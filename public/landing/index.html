<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TON City  חיסכון חכם מתחיל כאן</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(145deg, #0a0a1a 0%, #151530 50%, #0a0a1a 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 25px 50px -10px rgba(0,0,0,0.6);
    padding: 50px 35px;
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 3.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #00d4ff, #7b2fbe, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { font-size: 1.3rem; opacity: 0.85; margin: 20px 0 35px; }
  .features { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
  .feature { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; font-weight: 500; }
  .btn {
    display: inline-block;
    background: #4ade80;
    color: #000 !important;
    padding: 18px 45px;
    border-radius: 60px;
    font-size: 1.3rem;
    font-weight: bold;
    text-decoration: none;
    margin: 10px;
    transition: all 0.25s;
    box-shadow: 0 8px 25px rgba(74,222,128,0.4);
  }
  .btn:hover { transform: scale(1.06); }
  .btn-outline {
    background: transparent;
    border: 2px solid #eab308;
    color: #eab308 !important;
  }
  .btn-outline:hover { background: #eab308; color: #000 !important; }
</style>
</head>
<body>
<div class="glass">
  <h1>🚀 TON City</h1>
  <p class="subtitle">עצור את הכסף שזורם לפח.<br>חיסכון חכם, פנסיה בטוחה, קהילה מבוזרת  הכל במקום אחד.</p>
  <div class="features">
    <div class="feature">💰 חיסכון של אלפי  בשנה</div>
    <div class="feature">📊 מחשבון פנסיה חכם</div>
    <div class="feature">🎓 אקדמיה חינוכית</div>
    <div class="feature">👥 קהילה + הפניות</div>
  </div>
  <a href="https://t.me/Tax_Free_world_bot" class="btn">📱 פתח את הבוט</a>
  <a href="https://t.me/Tax_Free_world_bot?start=ref" class="btn btn-outline">🎁 קבל בונוס</a>
</div>
</body>
</html>
