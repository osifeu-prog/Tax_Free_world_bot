<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון TON</title>
    <style>
        body { font-family: Arial, sans-serif; background:#1a1a2e; color:white; padding:20px; text-align:center; }
        input, select { padding:10px; margin:5px; border-radius:8px; border:none; width:80%; }
        button { background:#2ecc71; color:white; border:none; padding:12px 30px; border-radius:50px; font-size:1em; cursor:pointer; margin:10px; }
        .lang-bar { position:fixed; top:10px; right:10px; }
        .lang-bar button { background:rgba(255,255,255,0.2); font-size:0.8em; padding:5px 12px; }
    </style>
</head>
<body>
    <div class="lang-bar">
        <button onclick="switchLang('he')">🇮🇱</button>
        <button onclick="switchLang('en')">🇬🇧</button>
        <button onclick="switchLang('ru')">🇷🇺</button>
    </div>
    <h1 id="headline">💰 מחשבון TON</h1>
    <p id="subhead">גלה כמה כסף תוכל לחסוך השנה</p>
    <label id="lblAmount">סכום להעברה ()</label>
    <input type="number" id="amount" value="500">
    <label id="lblFreq">העברות בחודש</label>
    <input type="number" id="freq" value="10">
    <div id="results">
        <p>🔴 <span id="bitFee">7.50</span> </p>
        <p>🟠 <span id="boxFee">9.50</span> </p>
        <p>🟢 <span id="tonFee">0.50</span> </p>
        <p id="savingsText">💰 חיסכון שנתי: <span id="savings">840</span> </p>
    </div>
    <button onclick="calculate()">חשב</button>
    <br>
    <a href="https://t.me/share/url?url=https://t.me/Tax_Free_world_bot&text=%D7%97%D7%A1%D7%9B%D7%AA%D7%99%20840%20%D7%A9%22%D7%97%20%D7%91%D7%A2%D7%9E%D7%9C%D7%95%D7%AA%20%D7%A2%D7%9D%20TON!" target="_blank" id="shareBtn">📤 שלח לחבר וגם הוא יחסוך!</a>
    <script>
        const translations = {
            he: { headline:"💰 מחשבון TON", subhead:"גלה כמה כסף תוכל לחסוך השנה", lblAmount:"סכום להעברה ()", lblFreq:"העברות בחודש", bitFee:"7.50", boxFee:"9.50", tonFee:"0.50", savingsText:"💰 חיסכון שנתי: ", shareBtn:"📤 שלח לחבר וגם הוא יחסוך!" },
            en: { headline:"💰 TON Calculator", subhead:"Discover how much you could save per year", lblAmount:"Amount per transfer ()", lblFreq:"Transfers per month", bitFee:"7.50", boxFee:"9.50", tonFee:"0.50", savingsText:"💰 Yearly savings: ", shareBtn:"📤 Share with a friend!" },
            ru: { headline:"💰 Калькулятор TON", subhead:"Узнайте, сколько вы сэкономите в год", lblAmount:"Сумма перевода ()", lblFreq:"Переводов в месяц", bitFee:"7.50", boxFee:"9.50", tonFee:"0.50", savingsText:"💰 Годовая экономия: ", shareBtn:"📤 Поделиться с другом!" }
        };
        let currentLang = 'he';
        function switchLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang==='he'? 'rtl':'ltr';
            const t = translations[lang];
            document.getElementById('headline').textContent = t.headline;
            document.getElementById('subhead').textContent = t.subhead;
            document.getElementById('lblAmount').textContent = t.lblAmount;
            document.getElementById('lblFreq').textContent = t.lblFreq;
            document.getElementById('bitFee').textContent = t.bitFee;
            document.getElementById('boxFee').textContent = t.boxFee;
            document.getElementById('tonFee').textContent = t.tonFee;
            document.getElementById('savingsText').innerHTML = t.savingsText + '<span id="savings">0</span> ';
            document.getElementById('shareBtn').textContent = t.shareBtn;
            calculate();
        }
        function calculate() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const freq = parseInt(document.getElementById('freq').value) || 0;
            const bitCost = amount * 0.015;
            const boxCost = amount * 0.019;
            const tonCost = amount * 0.001;
            const yearlySaving = (bitCost - tonCost) * freq * 12;
            document.getElementById('bitFee').textContent = bitCost.toFixed(2);
            document.getElementById('boxFee').textContent = boxCost.toFixed(2);
            document.getElementById('tonFee').textContent = tonCost.toFixed(2);
            document.getElementById('savings').textContent = yearlySaving.toFixed(0);
        }
    </script>
</body>
</html>
