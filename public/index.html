<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Free World</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 2rem; }
        .logo { font-size: 3rem; margin-bottom: 1rem; }
        h1 { color: #38bdf8; }
        .btn { display: inline-block; padding: 1rem 2rem; background: #38bdf8; color: #0f172a; border-radius: 8px; text-decoration: none; font-weight: bold; margin: 1rem; }
        .btn:hover { background: #7dd3fc; }
        .lang-switch { position: absolute; top: 1rem; left: 1rem; }
        .lang-switch a { color: #f8fafc; margin: 0 0.5rem; }
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="#" onclick="switchLang('he')">🇮🇱 עברית</a> | 
        <a href="#" onclick="switchLang('en')">🇬🇧 English</a>
    </div>
    <div class="logo">🌍</div>
    <h1 id="title">Tax Free World</h1>
    <p id="subtitle">למד, חסוך, השקע  עולם כלכלי חופשי</p>
    <a class="btn" href="https://t.me/Tax_Free_world_bot" target="_blank" id="cta">🚀 התחבר לבוט</a>
    <p style="margin-top: 2rem; opacity: 0.7;">Powered by TON & Israel</p>

    <script>
        const texts = {
            he: { title: 'Tax Free World', subtitle: 'למד, חסוך, השקע  עולם כלכלי חופשי', cta: '🚀 התחבר לבוט' },
            en: { title: 'Tax Free World', subtitle: 'Learn, Save, Invest  A Free Financial World', cta: '🚀 Join the Bot' }
        };
        function switchLang(lang) {
            document.getElementById('title').textContent = texts[lang].title;
            document.getElementById('subtitle').textContent = texts[lang].subtitle;
            document.getElementById('cta').textContent = texts[lang].cta;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
        }
        // ברירת מחדל  עברית
        switchLang('he');
    </script>
</body>
</html>
